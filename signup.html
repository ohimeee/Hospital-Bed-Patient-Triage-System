<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Hospital Bed Patient Triage</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="auth-shell">
    <main class="auth-card">
        <h1>Register</h1>
        <p class="auth-desc">Create your account to manage hospital bed triage.</p>

        <form class="auth-form">
            <label for="fullName">Full Name</label>
            <input id="fullName" type="text" placeholder="Enter full name" />

            <label for="email">Email or Phone</label>
            <input id="email" type="email" placeholder="svarda@gmail.co.id" />

            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Create a password" />

            <button type="submit" class="primary-button">Sign Up</button>

            <div class="divider"><span>OR</span></div>

            <button type="button" class="google-button">
                <svg viewBox="0 0 24 24" class="google-icon" aria-hidden="true">
                    <path fill="#4285F4" d="M23.5 12.27c0-.82-.08-1.61-.23-2.37H12v4.5h6.36c-.28 1.5-1.13 2.78-2.4 3.63v3.02h3.88c2.27-2.09 3.58-5.18 3.58-8.78z"/>
                    <path fill="#34A853" d="M12 24c3.24 0 5.95-1.06 7.93-2.88l-3.88-3.02c-1.08.72-2.47 1.14-4.05 1.14-3.1 0-5.72-2.1-6.66-4.95H1.22v3.09C3.16 21.81 7.29 24 12 24z"/>
                    <path fill="#FBBC05" d="M5.34 14.29c-.24-.72-.38-1.5-.38-2.29s.14-1.57.38-2.29V6.62H1.22A11.99 11.99 0 0 0 0 12c0 1.95.47 3.79 1.22 5.38l4.12-3.09z"/>
                    <path fill="#EA4335" d="M12 4.8c1.76 0 3.33.61 4.57 1.81l3.42-3.42C17.94 1.16 15.24 0 12 0 7.29 0 3.16 2.19 1.22 5.62l4.12 3.09C6.28 6.9 8.9 4.8 12 4.8z"/>
                </svg>
                Continue with Google
            </button>

            <p class="signup-line">Already have an account? <a href="index.html">Login</a></p>
        </form>
    </main>
</div>
</body>
</html>
