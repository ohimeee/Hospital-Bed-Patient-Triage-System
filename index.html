<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CARESYNC</title>
  </head>
  <body>
    <div id="app">
      <!-- HEADER -->
      <header class="topbar">
        <div>
          <h1>CARESYNC: Bed Availability & Patient Triage</h1>
        </div>
      </header>

      <main class="layout">


        <!-- TRIAGE -->
        <section class="work-area">
          <div class="panel triage-panel">
            <h2>Patient Triage</h2>

            <label>Patient Name</label>
            <input id="patientName" type="text" placeholder="Enter patient name" />

            <label>Bed Type</label>
            <select id="bedType">
              <option value="ICU">ICU</option>
              <option value="Emergency">Emergency</option>
              <option value="Pediatric">Pediatric</option>
              <option value="Maternity">Maternity</option>
            </select>

            <button id="admitButton" class="primary-button" type="button">Admit Patient</button>

            <div class="form-divider"></div>

            <h2>Add Bed</h2>

            <label for="newBedId">Bed ID</label>
            <input id="newBedId" type="text" placeholder="Example: ICU-03" />

            <label for="newBedType">Bed Type</label>
            <select id="newBedType">
              <option value="ICU">ICU</option>
              <option value="Emergency">Emergency</option>
              <option value="Pediatric">Pediatric</option>
              <option value="Maternity">Maternity</option>
            </select>

            <button id="addBedButton" class="secondary-button" type="button">Add Bed</button>
          </div>

          <!-- BEDS -->
          <div class="panel beds-panel">
            <div class="panel-heading">

              <section class="summary-grid">
                <article class="summary-card">
                  <strong>TOTAL: </strong>
                  <strong id="totalBeds">0</strong>
                </article>

                <article class="summary-card">
                  <strong>OCCUPIED: </strong>
                  <strong id="occupiedBeds">0</strong>
                </article>

                <article class="summary-card">
                  <strong>AVAILABLE: </strong>
                  <strong id="availableBeds">0</strong>
                </article>
              </section>

              
              <div id="capacity-pill" class="capacity-pill normal">
                <span id="capacity-percent">0%</span>
                <small id="capacity-text">Capacity normal</small>
              </div>

            </div>

          <div id="bedsGrid" class="beds-grid"></div>
          </div>
        </section>

        <!-- LOG -->
        <section class="panel log-panel">
          <div class="panel-heading">
            <h2>Activity Log</h2>
            <button id="clearLogButton">Clear</button>
          </div>

          <div id="activityLog"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
