<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CARESYNC</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div>
          <h1>CARESYNC: Bed Availability & Patient Triage</h1>
          <button id="openMenuBtn" class="menu-button" type="button">Operations Menu</button>
        </div>

        
      </header>

      <main class="layout">
        <section class="work-area">

          <div class="panel beds-panel">
            <div class="panel-heading">
              <section class="summary-grid">
                <article class="summary-card">
                  <strong>TOTAL: </strong>
                  <strong id="totalBeds">0</strong>
                </article>

                <article class="summary-card">
                  <strong>OCCUPIED: </strong>
                  <strong id="occupiedBeds">0</strong>
                </article>

                <div class="available-with-progress">
                  <article class="summary-card">
                    <strong>AVAILABLE: </strong>
                    <strong id="availableBeds">0</strong>
                  </article>

                  <div id="capacity-pill" class="capacity-pill normal">
                    <div id="capacity-fill" class="capacity-fill" style="width:0%"></div>
                    <div class="capacity-labels">
                      <span id="capacity-percent">0%</span>
                      <small id="capacity-text">Capacity normal</small>
                    </div>
                  </div>
                </div>
              </section>
            </div>

            <div id="bedsGrid" class="beds-grid"></div>
          </div>
        </section>

        <section class="panel log-panel">
          <div class="panel-heading">
            <h2>Activity Log</h2>
            <button id="clearLogButton" type="button">Clear</button>
          </div>

          <div id="activityLog"></div>
        </section>
      </main>

      <div id="modal" class="modal">
        <div class="modal-content">
          <div class="modal-header">
            <h2>Operations Menu</h2>
            <button id="closeModalBtn" class="close-btn" type="button">&times;</button>
          </div>

          <div class="modal-body">
            <label for="operationType">Choose an operation</label>
            <select id="operationType">
              <option value="admit">Admit Patient</option>
              <option value="add">Add Bed</option>
              <option value="transfer">Transfer Patient</option>
              <option value="monitor">Change Monitoring Level</option>
            </select>

            <div id="admitForm" class="form-section">
              <label>Patient Name</label>
              <input id="patientName" type="text" placeholder="Enter patient name" />
              <label>Bed Type</label>
              <select id="bedType">
                <option value="ICU">ICU</option>
                <option value="Emergency">Emergency</option>
                <option value="Pediatric">Pediatric</option>
                <option value="Maternity">Maternity</option>
              </select>
              <button id="admitButton" class="modal-btn" type="button">Admit Patient</button>
            </div>

            <div id="addBedForm" class="form-section hidden">
              <label>Bed ID</label>
              <input id="newBedId" type="text" placeholder="Example: ICU-03" />
              <label>Bed Type</label>
              <select id="newBedType">
                <option value="ICU">ICU</option>
                <option value="Emergency">Emergency</option>
                <option value="Pediatric">Pediatric</option>
                <option value="Maternity">Maternity</option>
              </select>
              <button id="addBedButton" class="modal-btn" type="button">Add Bed</button>
            </div>

            <div id="transferForm" class="form-section hidden">
              <label>From Bed ID</label>
              <input id="fromBedId" type="text" placeholder="e.g., ICU-01" />
              <label>To Bed ID</label>
              <input id="toBedId" type="text" placeholder="e.g., MAT-01" />
              <button id="transferBtn" class="modal-btn" type="button">Transfer Patient</button>
            </div>

            <div id="monitorForm" class="form-section hidden">
              <label>Bed ID</label>
              <input id="monitorBedId" type="text" placeholder="e.g., ICU-01" />
              <label>Monitoring Level</label>
              <select id="monitorLevel">
                <option value="Normal">Normal</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>
              <button id="monitorBtn" class="modal-btn" type="button">Update Monitoring</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
