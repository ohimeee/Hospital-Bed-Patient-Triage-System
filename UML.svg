  <path class="line" d="M895 799 L895 830 L1042 830 L1042 885" marker-start="url(#inherit)"/>

  <!-- Inheritance: CriticalBed to ICU and Emergency -->
  <path class="line" d="M720 1061 L720 1220 L305 1220 L305 1300" marker-start="url(#inherit)"/>
  <path class="line" d="M720 1061 L720 1220 L590 1220 L590 1300" marker-start="url(#inherit)"/>

  <!-- Inheritance: GeneralBed to Pediatric and Maternity -->
  <path class="line" d="M1042 1061 L1042 1220 L880 1220 L880 1300" marker-start="url(#inherit)"/>
  <path class="line" d="M1042 1061 L1042 1220 L1175 1220 L1175 1300" marker-start="url(#inherit)"/>

