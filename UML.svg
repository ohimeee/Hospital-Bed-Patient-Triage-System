    <text class="text" x="10" y="128">_patientName : string</text>
    <text class="text" x="10" y="146">_doctorName : string</text>
    <text class="text" x="10" y="164">_bedType : string</text>
    <text class="text" x="10" y="182">_dailyRate/_totalBill : number</text>
