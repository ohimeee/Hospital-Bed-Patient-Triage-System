<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="1320" viewBox="0 0 1420 1320">
  <defs>
    <style>
      .box { fill: #fff; stroke: #111; stroke-width: 1.4; }
      .line { stroke: #111; stroke-width: 1.2; fill: none; }
      .dash { stroke: #111; stroke-width: 1.2; fill: none; stroke-dasharray: 6 4; }
      .title { font: 13px Arial, sans-serif; fill: #111; }
      .text { font: 12px Arial, sans-serif; fill: #111; }
      .small { font: 11px Arial, sans-serif; fill: #111; }
      .abstract { font: italic 12px Arial, sans-serif; fill: #111; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <marker id="inherit" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto">
      <path d="M 1 1 L 13 7 L 1 13 z" fill="#fff" stroke="#111" stroke-width="1.2"/>
    </marker>
    <marker id="diamond" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto">
      <path d="M 1 7 L 7 1 L 13 7 L 7 13 z" fill="#111"/>
    </marker>
  </defs>

  <rect width="1420" height="1320" fill="#fff"/>

  <!-- UI and main -->
  <g transform="translate(35,55)">
    <rect class="box" width="265" height="220" rx="5"/>
    <line class="line" x1="0" y1="36" x2="265" y2="36"/>
    <line class="line" x1="0" y1="112" x2="265" y2="112"/>
    <text class="title" x="10" y="22">UIManager</text>
    <text class="text" x="10" y="56">system : HospitalTriageSystem</text>
    <text class="text" x="10" y="74">bedsGrid : HTMLDivElement</text>
    <text class="text" x="10" y="92">log/modal : HTMLDivElement</text>
    <text class="text" x="10" y="110">operationType : HTMLSelectElement</text>
    <text class="small" x="10" y="134">constructor(system)</text>
    <text class="small" x="10" y="152">admitPatient() / addBed()</text>
    <text class="small" x="10" y="170">transferPatient() / refresh()</text>
    <text class="small" x="10" y="188">changeMonitoringLevel()</text>
    <text class="small" x="10" y="206">simulateDay()</text>
  </g>

  <g transform="translate(75,340)">
    <rect class="box" width="205" height="110" rx="5"/>
    <line class="line" x1="0" y1="36" x2="205" y2="36"/>
    <text class="title" x="10" y="22">Main</text>
    <text class="abstract" x="70" y="22">&lt;&lt;module&gt;&gt;</text>
    <text class="small" x="10" y="58">new HospitalTriageSystem()</text>
    <text class="small" x="10" y="76">new UIManager(system)</text>
    <text class="small" x="10" y="94">setInterval(simulateDay)</text>
  </g>

  <!-- Main system -->
  <g transform="translate(360,55)">
    <rect class="box" width="330" height="415" rx="5"/>
    <line class="line" x1="0" y1="36" x2="330" y2="36"/>
    <line class="line" x1="0" y1="70" x2="330" y2="70"/>
    <text class="title" x="10" y="22">HospitalTriageSystem</text>
    <text class="text" x="10" y="56">_bedsList : HospitalBed[]</text>
    <text class="small" x="10" y="92">constructor()</text>
    <text class="small" x="10" y="110">findAvailableBed(type) : HospitalBed?</text>
    <text class="small" x="10" y="128">findBedById(id) : HospitalBed?</text>
    <text class="small" x="10" y="146">createBed(type, id) : HospitalBed</text>
    <text class="small" x="10" y="164">addBed(type, id) : string</text>
    <text class="small" x="10" y="182">deleteBed(id) : string</text>
    <text class="small" x="10" y="200">admitPatient(type, name) : string</text>
    <text class="small" x="10" y="218">dischargePatient(id) : string</text>
    <text class="small" x="10" y="236">setDoctor(id, doctor) : string</text>
    <text class="small" x="10" y="254">setMonitoringLevel(id, level) : string</text>
    <text class="small" x="10" y="272">movePatient(fromId, toId) : string</text>
    <text class="small" x="10" y="290">getBedsList() : HospitalBed[]</text>
    <text class="small" x="10" y="308">getCapacitySummary() : CapacitySummary</text>
    <text class="small" x="10" y="326">passOneDay() : string[]</text>
    <text class="small" x="10" y="344">addGuardianToBed(id, name) : string</text>
    <text class="small" x="10" y="362">setRecordDelivery(id, date, name) : string</text>
    <text class="small" x="10" y="380">triage() / checkCriticalStatus()</text>
  </g>

  <g transform="translate(770,55)">
    <rect class="box" width="330" height="515" rx="5"/>
    <line class="line" x1="0" y1="36" x2="330" y2="36"/>
    <line class="line" x1="0" y1="220" x2="330" y2="220"/>
    <text class="title" x="10" y="22">HospitalBed</text>
    <text class="abstract" x="180" y="22">&lt;&lt;abstract&gt;&gt;</text>
    <text class="text" x="10" y="56">_bedId : string</text>
    <text class="text" x="10" y="74">_wardName : string</text>
    <text class="text" x="10" y="92">_isOccupied : boolean</text>
    <text class="text" x="10" y="110">_hasAssignedDoctor : boolean</text>
    <text class="text" x="10" y="128">_patientName : string</text>
    <text class="text" x="10" y="146">_doctorName : string</text>
    <text class="text" x="10" y="164">_bedType : string</text>
    <text class="text" x="10" y="182">_dailyRate/_totalBill : number</text>
    <text class="text" x="10" y="200">_daysAdmitted : number</text>
    <text class="text" x="10" y="218">_monitoringLevel : string</text>
    <text class="small" x="10" y="242">constructor(id, ward, dailyRate)</text>
    <text class="small" x="10" y="260">getters/setters for bed and billing state</text>
    <text class="small" x="10" y="278">chargeOneDay() : string</text>
    <text class="small" x="10" y="296">restoreBilling(total, days) : void</text>
    <text class="small" x="10" y="314">admitPatient(name) : string</text>
    <text class="small" x="10" y="332">dischargePatient() : string</text>
    <text class="small" x="10" y="350">setDoctor(name) : string</text>
    <text class="small" x="10" y="368">baseAdmit(name) : boolean</text>
    <text class="small" x="10" y="386">baseDischarge() : boolean</text>
    <text class="small" x="10" y="404">baseSetDoctor(name) : boolean</text>
    <text class="small" x="10" y="422">alreadyOccupiedMsg() : string</text>
    <text class="small" x="10" y="440">alreadyVacantMsg() : string</text>
    <text class="small" x="10" y="458">setMonitoringLevel(value) : void</text>
    <text class="small" x="10" y="476">getMonitoringLevel() : string</text>
    <text class="small" x="10" y="494">getBedInfo()* : string</text>
  </g>

  <!-- Supporting types -->
  <g transform="translate(1170,55)">
    <rect class="box" width="160" height="128" rx="5"/>
    <line class="line" x1="0" y1="36" x2="160" y2="36"/>
    <text class="title" x="10" y="22">BedType</text>
    <text class="abstract" x="92" y="22">&lt;&lt;type&gt;&gt;</text>
    <text class="text" x="10" y="58">ICU</text>
    <text class="text" x="10" y="76">Emergency</text>
    <text class="text" x="10" y="94">Pediatric</text>
    <text class="text" x="10" y="112">Maternity</text>
  </g>

  <g transform="translate(1170,220)">
    <rect class="box" width="200" height="86" rx="5"/>
    <line class="line" x1="0" y1="36" x2="200" y2="36"/>
    <text class="title" x="10" y="22">BedDefaults</text>
    <text class="abstract" x="120" y="22">&lt;&lt;type&gt;&gt;</text>
    <text class="text" x="10" y="58">wardName : string</text>
    <text class="text" x="10" y="76">detail : string</text>
  </g>

  <g transform="translate(1170,340)">
    <rect class="box" width="205" height="86" rx="5"/>
    <line class="line" x1="0" y1="36" x2="205" y2="36"/>
    <text class="title" x="10" y="22">CapacitySummary</text>
    <text class="abstract" x="132" y="22">&lt;&lt;type&gt;&gt;</text>
    <text class="text" x="10" y="58">occupied : number</text>
    <text class="text" x="10" y="76">total, percent : number</text>
  </g>

  <g transform="translate(1170,465)">
    <rect class="box" width="195" height="92" rx="5"/>
    <line class="line" x1="0" y1="36" x2="195" y2="36"/>
    <text class="title" x="10" y="22">Constants</text>
    <text class="abstract" x="96" y="22">&lt;&lt;records&gt;&gt;</text>
    <text class="small" x="10" y="58">BED_DEFAULTS</text>
    <text class="small" x="10" y="76">BED_TYPE_MAP</text>
  </g>

  <!-- Middle row -->
  <g transform="translate(620,700)">
    <rect class="box" width="280" height="176" rx="5"/>
    <line class="line" x1="0" y1="36" x2="280" y2="36"/>
    <line class="line" x1="0" y1="70" x2="280" y2="70"/>
    <text class="title" x="10" y="22">CriticalBed</text>
    <text class="abstract" x="135" y="22">&lt;&lt;abstract&gt;&gt;</text>
    <text class="text" x="10" y="58">uses monitoring level</text>
    <text class="small" x="10" y="92">constructor(id, ward, level, rate)</text>
    <text class="small" x="10" y="110">getMonitoringLevel() : string</text>
    <text class="small" x="10" y="128">getBedInfo() : string</text>
    <text class="small" x="10" y="146">setMonitoringLevel(value) : void</text>
  </g>

  <g transform="translate(975,700)">
    <rect class="box" width="250" height="176" rx="5"/>
    <line class="line" x1="0" y1="36" x2="250" y2="36"/>
    <line class="line" x1="0" y1="88" x2="250" y2="88"/>
    <text class="title" x="10" y="22">GeneralBed</text>
    <text class="abstract" x="130" y="22">&lt;&lt;abstract&gt;&gt;</text>
    <text class="text" x="10" y="58">_wardFloor : string</text>
    <text class="small" x="10" y="110">constructor(id, ward, floor, rate)</text>
    <text class="small" x="10" y="128">getWardFloor() : string</text>
    <text class="small" x="10" y="146">getBedInfo() : string</text>
    <text class="small" x="10" y="164">setWardFloor(value) : void</text>
  </g>

  <!-- Bottom row -->
  <g transform="translate(195,1090)">
    <rect class="box" width="240" height="148" rx="5"/>
    <line class="line" x1="0" y1="36" x2="240" y2="36"/>
    <line class="line" x1="0" y1="88" x2="240" y2="88"/>
    <text class="title" x="10" y="22">ICUBed</text>
    <text class="text" x="10" y="58">oxygenLevel : number</text>
    <text class="text" x="10" y="76">bloodPressure : number</text>
    <text class="small" x="10" y="110">constructor(id, ward, level)</text>
    <text class="small" x="10" y="128">checkCriticalStatus(spo2, bp) : string</text>
    <text class="small" x="10" y="146">dischargePatient() : string</text>
  </g>

  <g transform="translate(495,1090)">
    <rect class="box" width="250" height="148" rx="5"/>
    <line class="line" x1="0" y1="36" x2="250" y2="36"/>
    <line class="line" x1="0" y1="88" x2="250" y2="88"/>
    <text class="title" x="10" y="22">EmergencyBed</text>
    <text class="text" x="10" y="58">temperature : number</text>
    <text class="text" x="10" y="76">heartRate : number</text>
    <text class="small" x="10" y="110">constructor(id, ward, level)</text>
    <text class="small" x="10" y="128">checkSepsisRisk(temp, bpm) : string</text>
    <text class="small" x="10" y="146">dischargePatient() : string</text>
  </g>

  <g transform="translate(805,1090)">
    <rect class="box" width="250" height="148" rx="5"/>
    <line class="line" x1="0" y1="36" x2="250" y2="36"/>
    <line class="line" x1="0" y1="70" x2="250" y2="70"/>
    <text class="title" x="10" y="22">PediatricBed</text>
    <text class="text" x="10" y="58">_guardianName : string</text>
    <text class="small" x="10" y="92">constructor(id, ward, floor)</text>
    <text class="small" x="10" y="110">get guardianName() : string</text>
    <text class="small" x="10" y="128">addGuardianInfo(name) : string</text>
    <text class="small" x="10" y="146">dischargePatient() : string</text>
  </g>

  <g transform="translate(1115,1090)">
    <rect class="box" width="260" height="166" rx="5"/>
    <line class="line" x1="0" y1="36" x2="260" y2="36"/>
    <line class="line" x1="0" y1="88" x2="260" y2="88"/>
    <text class="title" x="10" y="22">MaternityBed</text>
    <text class="text" x="10" y="58">_hasDelivered : boolean</text>
    <text class="text" x="10" y="76">_deliveryDate/_newbornName : string</text>
    <text class="small" x="10" y="110">constructor(id, ward, floor)</text>
    <text class="small" x="10" y="128">delivery getters</text>
    <text class="small" x="10" y="146">recordDelivery(date, name) : string</text>
    <text class="small" x="10" y="164">dischargePatient() : string</text>
  </g>

  <!-- Associations and dependencies -->
  <line class="line" x1="300" y1="145" x2="360" y2="145" marker-end="url(#arrow)"/>
  <line class="line" x1="690" y1="145" x2="770" y2="145" marker-end="url(#diamond)"/>
  <path class="line" d="M175 340 L175 275" marker-end="url(#arrow)"/>
  <path class="line" d="M280 410 L360 255" marker-end="url(#arrow)"/>

  <path class="dash" d="M690 180 L705 180 L705 30 L1150 30 L1150 115 L1170 115" marker-end="url(#arrow)"/>
  <path class="dash" d="M690 260 L720 260 L720 590 L1140 590 L1140 263 L1170 263" marker-end="url(#arrow)"/>
  <path class="dash" d="M690 360 L710 360 L710 620 L1155 620 L1155 383 L1170 383" marker-end="url(#arrow)"/>
  <path class="dash" d="M690 430 L700 430 L700 650 L1165 650 L1165 505 L1170 505" marker-end="url(#arrow)"/>

  <!-- Inheritance -->
  <path class="line" d="M935 570 L935 640 L760 640 L760 700" marker-start="url(#inherit)"/>
  <path class="line" d="M935 570 L935 640 L1100 640 L1100 700" marker-start="url(#inherit)"/>
  <path class="line" d="M760 876 L760 1010 L315 1010 L315 1090" marker-start="url(#inherit)"/>
  <path class="line" d="M760 876 L760 1010 L620 1010 L620 1090" marker-start="url(#inherit)"/>
  <path class="line" d="M1100 876 L1100 1010 L930 1010 L930 1090" marker-start="url(#inherit)"/>
  <path class="line" d="M1100 876 L1100 1010 L1245 1010 L1245 1090" marker-start="url(#inherit)"/>

  <!-- UI references to concrete bed classes -->
  <path class="dash" d="M35 176 L5 176 L5 1040 L255 1040 L255 1090" marker-end="url(#arrow)"/>
  <path class="dash" d="M35 194 L15 194 L15 1028 L555 1028 L555 1090" marker-end="url(#arrow)"/>
  <path class="dash" d="M35 212 L25 212 L25 1016 L855 1016 L855 1090" marker-end="url(#arrow)"/>
  <path class="dash" d="M35 230 L32 230 L32 1004 L1175 1004 L1175 1090" marker-end="url(#arrow)"/>

  <!-- Labels -->
  <text class="small" x="315" y="135">controls</text>
  <text class="small" x="707" y="135">manages</text>
  <text class="small" x="98" y="310">creates</text>
  <text class="small" x="295" y="320">creates</text>
  <text class="small" x="1000" y="22">accepts</text>
  <text class="small" x="1018" y="582">uses defaults</text>
  <text class="small" x="1045" y="612">returns</text>
  <text class="small" x="1082" y="642">reads</text>
</svg>
